# 格式规范示例 — 东北大学硕士学位论文
# 用户应根据自己学校的要求修改此文件

meta:
  name: 东北大学硕士学位论文格式规范
  version: "1.0"

page:
  size: A4                    # 210×297mm
  margin_top_mm: 25
  margin_bottom_mm: 25
  margin_left_mm: 25
  margin_right_mm: 25
  body_width_mm: 160          # 版芯宽
  body_height_mm: 247         # 版芯高

fonts:
  body:
    chinese: 宋体
    english: "Times New Roman"
    size_pt: 12                # 小四号
  chapter_title:
    font: 黑体
    size_pt: 22                # 二号
    bold: true
  section_title:
    font: 黑体
    size_pt: 16                # 三号
    bold: true
  subsection_title:
    font: 黑体
    size_pt: 14                # 四号
    bold: true
  subsubsection_title:
    font: 黑体
    size_pt: 12                # 小四号
    bold: true

spacing:
  line_spacing: 1.5            # 倍行距
  paragraph_after_pt: 0
  chapter_title_before_pt: 24
  chapter_title_after_pt: 18

numbering:
  figure_format: "图{chapter}.{seq}"    # 图2.1
  table_format: "表{chapter}.{seq}"     # 表2.1
  equation_format: "({chapter}-{seq})"  # (2-1)
  figure_caption_position: below
  table_caption_position: above

references:
  style: numbered              # 顺序编号 [1][2]...
  format: "GB/T 7714-2015"

header_footer:
  header: true
  page_number_position: bottom_center
  page_number_start: 1         # 正文第1页起
  front_matter_roman: true     # 前置部分用罗马数字
